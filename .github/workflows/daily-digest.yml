name: Daily AI4S Digest Email

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  digest-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      DIGEST_TO_EMAIL: yusheraine@gmail.com
      GMAIL_SMTP_HOST: ${{ secrets.GMAIL_SMTP_HOST }}
      GMAIL_SMTP_PORT: ${{ secrets.GMAIL_SMTP_PORT }}
      GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
      GMAIL_SMTP_PASS: ${{ secrets.GMAIL_SMTP_PASS }}
      DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
      REMOTE_ANALYSIS_API_KEY: ${{ secrets.REMOTE_ANALYSIS_API_KEY }}
      REMOTE_ANALYSIS_MODEL: ${{ secrets.REMOTE_ANALYSIS_MODEL }}
      REMOTE_ANALYSIS_BASE_URL: ${{ secrets.REMOTE_ANALYSIS_BASE_URL }}
      REMOTE_ANALYSIS_TIMEOUT_MS: ${{ secrets.REMOTE_ANALYSIS_TIMEOUT_MS }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and send digest email
        run: npm run digest:send
